name: Daily Metrics Refresh

on:
  schedule:
    # Several attempts during the 06:00 Vienna hour in daylight saving time.
    - cron: "5,20,35,50 4 * * *"
    # Several attempts during the 06:00 Vienna hour in standard time.
    - cron: "5,20,35,50 5 * * *"
  workflow_dispatch:

jobs:
  refresh:
    name: Refresh platform metric snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Call protected refresh endpoint
        run: |
          curl --fail-with-body --show-error --silent \
            --request GET \
            --header "Authorization: Bearer $CRON_SECRET" \
            "https://love-strings-dashboard.vercel.app/api/metrics/refresh?scheduled=1"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
